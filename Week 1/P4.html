<!DOCTYPE html>
<html>
    <head>
        <title>Weekly Schedule</title>
        <style>
            body{
                font-family: Arial, sans-serif;
                background-color: #f5f5f5;
                text-align: center;
            }

            table{
                margin: auto;
                border-collapse: collapse;
                width: 60%;
                background-color: white;
            }

            th, td{
                border: 1px solid black;
                padding: 10px;
            }

            th{
                background-color: lightblue;
            }

            tr:hover{
                background-color: #f0f8ff;
            }
        </style>
    </head>
    <body>
        <h1 align="center">A Normal Weekly Schedule</h1>
        <hr>
        <table>
            <tr>
            <th>Day</th>
            <th>Subject</th>
            </tr>
            <tr>
                <td>Monday</td>
                <td>Maths</td>
            </tr>
            <tr>
                <td>Tuesday</td>
                <td>Literature</td>
            </tr>
            <tr>
                <td>Wednesday</td>
                <td>Biology</td>
            </tr>
            <tr>
                <td>Thursday</td>
                <td>Design</td>
            </tr>
            <tr>
                <td>Friday</td>
                <td>SSL</td>
            </tr>
            <tr>
                <td>Saturday</td>
                <td>Physics</td>
            </tr>
        </table>
    </body>
</html>
